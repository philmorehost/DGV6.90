; DGV6.90 — PHP Hardening via .user.ini
; This file is automatically picked up by PHP-FPM on cPanel servers.
; Changes apply to all PHP scripts in this directory and subdirectories.
; Restart PHP-FPM or wait up to 5 minutes for changes to take effect.

; ── Security ──────────────────────────────────────────────────────────────────
; Hide the PHP version from response headers (reduces attack surface)
expose_php = Off

; ── Session Security ──────────────────────────────────────────────────────────
; Prevent JavaScript from reading session cookies (XSS protection)
session.cookie_httponly = On

; Only send session cookie over HTTPS
; Set to Off temporarily if you don't have SSL during local development
session.cookie_secure = On

; Prevent CSRF via cross-site cookie sending
session.cookie_samesite = Strict

; Prevent session fixation attacks
session.use_strict_mode = On

; Regenerate session IDs regularly
session.gc_maxlifetime = 3600

; Store sessions in files (default, secure for shared hosting)
session.save_handler = files

; ── Upload Limits ─────────────────────────────────────────────────────────────
upload_max_filesize = 10M
post_max_size = 12M

; ── Execution Limits ──────────────────────────────────────────────────────────
max_execution_time = 60
max_input_time = 60
memory_limit = 256M

; ── Error Handling (controlled by bc-php-compat.php at runtime) ───────────────
; These are fallback defaults before PHP boots our custom handler
log_errors = On
display_errors = Off
display_startup_errors = Off

; ── Output Buffering ──────────────────────────────────────────────────────────
; Needed for header() calls after some output (safety net)
output_buffering = On

; ── Date/Timezone ─────────────────────────────────────────────────────────────
date.timezone = Africa/Lagos

; ── Disable dangerous functions (uncomment if your host allows it) ────────────
; disable_functions = exec,passthru,shell_exec,system,proc_open,popen,parse_ini_file,show_source
